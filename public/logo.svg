<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 800 800" style="enable-background:new 0 0 800 800;" xml:space="preserve">
    <defs>
        <!-- Background Radial Gradient for a premium Dark Mode aura -->
        <radialGradient id="bgGradient" cx="50%" cy="50%" r="75%">
            <stop offset="0%" style="stop-color:#1e1a30"/>
            <stop offset="60%" style="stop-color:#0f0d1a"/>
            <stop offset="100%" style="stop-color:#07050e"/>
        </radialGradient>

        <!-- Intense Glow Filter for a vibrant dark-mode synthwave/neon vibe -->
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="14" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <!-- Soft Ambient Filter for background lighting -->
        <filter id="ambientGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="40" result="blur"/>
        </filter>

        <!-- Electric Cyan Gradient -->
        <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00f2fe"/>
            <stop offset="100%" style="stop-color:#4facfe"/>
        </linearGradient>

        <!-- Cyber Magenta Gradient -->
        <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ff007f"/>
            <stop offset="100%" style="stop-color:#7f00ff"/>
        </linearGradient>
        
        <!-- Text Typography Gradient -->
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ffffff"/>
            <stop offset="100%" style="stop-color:#b0a8cc"/>
        </linearGradient>
    </defs>

    <!-- Canvas Background Layer -->
    <rect width="800" height="800" fill="url(#bgGradient)"/>

    <!-- Dynamic Environment Aura Background Lights -->
    <circle cx="280" cy="360" r="150" fill="#ff007f" opacity="0.15" filter="url(#ambientGlow)"/>
    <circle cx="520" cy="360" r="150" fill="#00f2fe" opacity="0.12" filter="url(#ambientGlow)"/>

    <!-- Central Interactive Tech Emblem (Brackets + Audio Bars) -->
    <g id="EmblemGroup" transform="translate(0, -15)">
        
        <!-- Left Code Bracket Shape: '<' -->
        <path d="M 320 230 L 205 360 L 320 490" 
              fill="none" 
              stroke="url(#magentaGrad)" 
              stroke-width="26" 
              stroke-linecap="round" 
              stroke-linejoin="round"
              filter="url(#neonGlow)"/>

        <!-- Right Code Bracket Shape: '>' -->
        <path d="M 480 230 L 595 360 L 480 490" 
              fill="none" 
              stroke="url(#cyanGrad)" 
              stroke-width="26" 
              stroke-linecap="round" 
              stroke-linejoin="round"
              filter="url(#neonGlow)"/>

        <!-- Audio Vibe Equalisers & Cursor Layout Grid in Center -->
        <!-- Channel 1 Bar -->
        <rect x="362" y="295" width="16" height="130" rx="8" fill="url(#magentaGrad)" opacity="0.85">
            <animate attributeName="height" values="130;90;150;130" dur="2.5s" repeatCount="indefinite"/>
            <animate attributeName="y" values="295;315;285;295" dur="2.5s" repeatCount="indefinite"/>
        </rect>
        
        <!-- Channel 2 Bar (Main Cursor Node) -->
        <rect x="392" y="250" width="16" height="220" rx="8" fill="url(#cyanGrad)" filter="url(#neonGlow)">
            <animate attributeName="height" values="220;170;240;220" dur="1.8s" repeatCount="indefinite"/>
            <animate attributeName="y" values="250;275;240;250" dur="1.8s" repeatCount="indefinite"/>
        </rect>
        
        <!-- Channel 3 Bar -->
        <rect x="422" y="320" width="16" height="80" rx="8" fill="url(#cyanGrad)" opacity="0.85">
            <animate attributeName="height" values="80;140;60;80" dur="2.1s" repeatCount="indefinite"/>
            <animate attributeName="y" values="320;290;330;320" dur="2.1s" repeatCount="indefinite"/>
        </rect>
    </g>

    <!-- Logo Branding Label Typographics -->
    <text x="404" y="615" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="68" 
          font-weight="900" 
          letter-spacing="14" 
          fill="url(#textGrad)" 
          text-anchor="middle">VIBE</text>
          
    <text x="408" y="665" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="18" 
          font-weight="700" 
          letter-spacing="18" 
          fill="#00f2fe" 
          opacity="0.85"
          text-anchor="middle">CODE EDITOR</text>

    <!-- Structural Grid Markers -->
    <circle cx="160" cy="160" r="1.5" fill="#ffffff" opacity="0.15"/>
    <circle cx="640" cy="160" r="1.5" fill="#ffffff" opacity="0.15"/>
    <circle cx="160" cy="640" r="1.5" fill="#ffffff" opacity="0.15"/>
    <circle cx="640" cy="640" r="1.5" fill="#ffffff" opacity="0.15"/>
</svg>
